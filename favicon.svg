<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <!--
    Imbas favicon — antenna glyph on nocturnal mineral ground.
    Sized for crisp rendering at 16x16 and 32x32.
    Version: nocturnal-observatory, May 2026.
  -->
  <rect width="32" height="32" rx="5" fill="#0F141B"/>

  <!-- Left filament -->
  <path
    d="M16 28 C 15.6 22, 12.5 16, 7.5 5"
    stroke="#C97A4A"
    stroke-width="1.5"
    stroke-linecap="round"
    fill="none"
  />
  <circle cx="7" cy="4" r="1.9" fill="#C97A4A"/>

  <!-- Right filament -->
  <path
    d="M16 28 C 16.6 22, 20 15.5, 24.5 4.5"
    stroke="#C97A4A"
    stroke-width="1.5"
    stroke-linecap="round"
    fill="none"
  />
  <circle cx="25" cy="4" r="1.9" fill="#C97A4A"/>

  <!-- Base node -->
  <circle cx="16" cy="28" r="1.1" fill="#EAE4D6"/>
</svg>
